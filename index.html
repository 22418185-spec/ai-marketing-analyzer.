<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<title>AI Marketing Analyzer</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.1;
  animation: stars 60s linear infinite;
  z-index: -1;
}

@keyframes stars {
  from { transform: translateY(0); }
  to { transform: translateY(-500px); }
}

.chat-container {
  width: 95%;
  max-width: 600px;
  height: 90vh;
  background: rgba(40,40,40,0.75);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.title-box {
  text-align: center;
  margin-bottom: 15px;
}

.title-box h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, #00e5ff, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title-box p {
  font-size: 12px;
  color: #ccc;
}

.line {
  width: 60%;
  height: 2px;
  margin: 8px auto;
  background: linear-gradient(to right, transparent, #00e5ff, transparent);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.bot {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin: 6px;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin: 10px 6px;
}

.buttons button {
  flex: 1;
  min-width: 100px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.08);
  color: #00e5ff;
  font-weight: 600;
  cursor: pointer;
}

.buttons button:hover:not(:disabled) {
  background: linear-gradient(135deg, #00e5ff, #0077ff);
  color: white;
}

.buttons button.selected {
  background: #00e5ff !important;
  color: black !important;
}

.buttons button:disabled {
  opacity: 0.4;
  cursor: default;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="title-box">
    <h1>AI MARKETING ANALYZER</h1>
    <p>تحليل تأثير التسويق بالذكاء الاصطناعي</p>
    <div class="line"></div>
  </div>

  <div id="chat" class="messages"></div>
</div>

<script>
let answers = [];
let sent = false;

let questions = [
"يساهم التسويق بالذكاء الاصطناعي في تحسين صورة العلامة التجارية الرقمية.",
"يؤثر استخدام الذكاء الاصطناعي في الإعلانات على ثقة المستخدم.",
"يساعد الذكاء الاصطناعي في جعل العلامة التجارية أكثر تفاعلاً مع العملاء.",
"تؤدي الحملات التسويقية إلى نتائج أفضل للعلامة التجارية.",
"يساعد الذكاء الاصطناعي في بناء هوية رقمية أقوى.",
"الإعلانات المخصصة تزيد الارتباط بالعلامة التجارية.",
"يحسن الذكاء الاصطناعي تجربة المستخدم.",
"يساهم في تحسين السمعة الرقمية.",
"يزيد ولاء العملاء للعلامة التجارية.",
"يفهم احتياجات الجمهور بدقة.",
"يرفع التفاعل مع العلامة التجارية.",
"يحسن جودة المحتوى التسويقي.",
"يعزز التميز التنافسي.",
"يحسن قرارات التسويق.",
"يزيد فعالية الإعلانات.",
"يسرّع انتشار العلامة التجارية.",
"يقلل الأخطاء التسويقية.",
"يعتمد التسويق الحديث عليه.",
"يرفع رضا العملاء.",
"يحسن تحليل البيانات.",
"يحسن استهداف الجمهور.",
"يقلل تكلفة الإعلانات.",
"يتوقع سلوك العملاء.",
"أصبح أساسي في التسويق الرقمي."
];

window.onload = () => createQuestion(0);

function createQuestion(index) {
  if (index >= questions.length) return finish();

  let chat = document.getElementById("chat");

  let q = document.createElement("div");
  q.className = "bot";
  q.innerHTML = "<strong>السؤال " + (index + 1) + ":</strong><br>" + questions[index];

  let btns = document.createElement("div");
  btns.className = "buttons";

  let b1 = document.createElement("button");
  b1.innerText = "موافق";
  b1.onclick = () => selectAnswer(index, 3, b1);

  let b2 = document.createElement("button");
  b2.innerText = "محايد";
  b2.onclick = () => selectAnswer(index, 2, b2);

  let b3 = document.createElement("button");
  b3.innerText = "غير موافق";
  b3.onclick = () => selectAnswer(index, 1, b3);

  btns.appendChild(b1);
  btns.appendChild(b2);
  btns.appendChild(b3);

  chat.appendChild(q);
  chat.appendChild(btns);
  chat.scrollTop = chat.scrollHeight;
}

function selectAnswer(index, value, btn) {
  if (answers[index] !== undefined) return;

  answers[index] = value;

  btn.parentElement.querySelectorAll("button").forEach(b => b.disabled = true);
  btn.classList.add("selected");

  setTimeout(() => {
    createQuestion(index + 1);
  }, 150);
}

function finish() {
  if (sent) return;
  sent = true;

  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "bot";
  msg.innerText = "جاري حفظ الإجابات... ⏳";
  chat.appendChild(msg);

  fetch("https://script.google.com/macros/s/AKfycbyUnEJeet9gpPWYck2CfGD6Mpkc9XG7lsESQHVKvrfHBqsw8DcYF7bUlt7L-I-u0wea/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      answers: answers.map(Number)
    })
  });

  setTimeout(() => {
    msg.innerText = "تم حفظ الإجابات بنجاح ✅";
  }, 800);
}
</script>

</body>
</html>
