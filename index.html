<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<title>AI Marketing Analyzer</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.1;
  animation: stars 60s linear infinite;
  z-index: -1;
}

@keyframes stars {
  from { transform: translateY(0); }
  to { transform: translateY(-500px); }
}

.chat-container {
  width: 95%;
  max-width: 600px;
  height: 90vh;
  background: rgba(40,40,40,0.75);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.title-box {
  text-align: center;
  margin-bottom: 15px;
}

.title-box h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, #00e5ff, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title-box p {
  font-size: 12px;
  color: #ccc;
}

.line {
  width: 60%;
  height: 2px;
  margin: 8px auto;
  background: linear-gradient(to right, transparent, #00e5ff, transparent);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.bot {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin: 6px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.buttons {
  display: flex;
  gap: 10px;
  margin: 12px 6px;
  flex-wrap: wrap;
}

.buttons button {
  flex: 1;
  min-width: 100px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.08);
  color: #00e5ff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.buttons button:hover:not(:disabled) {
  background: linear-gradient(135deg, #00e5ff, #0077ff);
  color: white;
}

.buttons button.selected {
  background: linear-gradient(135deg, #00e5ff, #0077ff) !important;
  color: white !important;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="title-box">
    <h1>AI MARKETING ANALYZER</h1>
    <p>تحليل تأثير التسويق بالذكاء الاصطناعي على العلامات التجارية الرقمية</p>
    <div class="line"></div>
  </div>
  <div id="chat" class="messages"></div>
</div>

<script>

let answers = [];
let step = 0;
let sent = false;

let questions = [
"تؤثر أدوات الذكاء الاصطناعي بشكل إيجابي على الحملات التسويقية الرقمية.",
"يساعد الذكاء الاصطناعي في فهم سلوك العملاء بشكل أدق.",
"تحليل البيانات باستخدام الذكاء الاصطناعي يزيد من فعالية التسويق.",
"الإعلانات المولدة بالذكاء الاصطناعي أكثر جذباً من التقليدية.",
"الثقة بالإعلانات الرقمية تعتمد على وجود الذكاء الاصطناعي فيها.",
"الذكاء الاصطناعي يقلل من تكلفة الحملات التسويقية.",
"يساعد الذكاء الاصطناعي في استهداف الجمهور المناسب بدقة.",
"تستخدم الشركات الكبرى الذكاء الاصطناعي بشكل واسع في التسويق.",
"الذكاء الاصطناعي يحسن من تجربة المستخدم مع العلامة التجارية.",
"الذكاء الاصطناعي يزيد من سرعة اتخاذ القرارات التسويقية."
];

window.onload = () => {
  askQuestion();
};

function askQuestion() {

  if (step >= questions.length) {
    finish();
    return;
  }

  let chat = document.getElementById("chat");

  let q = document.createElement("div");
  q.className = "bot";
  q.innerHTML = "<strong>السؤال " + (step + 1) + ":</strong><br>" + questions[step];

  let btns = document.createElement("div");
  btns.className = "buttons";

  btns.innerHTML = `
    <button onclick="answer(3, ${step}, this)">موافق</button>
    <button onclick="answer(2, ${step}, this)">محايد</button>
    <button onclick="answer(1, ${step}, this)">غير موافق</button>
  `;

  chat.appendChild(q);
  chat.appendChild(btns);
  chat.scrollTop = chat.scrollHeight;
}

function answer(value, index, btn) {

  let container = btn.parentElement;

  if (container.dataset.locked === "1") return;
  container.dataset.locked = "1";

  container.querySelectorAll("button").forEach(b => {
    b.disabled = true;
    b.classList.remove("selected");
  });

  btn.classList.add("selected");

  // 🔥 FIX فقط هنا (بدون تغيير باقي الكود)
  answers[index] = value;

  if (index === step) {
    step++;
  }

  setTimeout(() => {
    askQuestion();
  }, 250);
}

function finish() {

  // 🔥 Google Sheets (إضافة فقط)
  fetch("https://script.google.com/macros/s/AKfycbzpvG-uaev_NUwvCLEvYcMTTFuL8JM5eq6gIyOPIbIcedUFWjqbg2IcPPvvRYg2vqP1/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      answers: answers
    })
  });

  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "bot";
  msg.innerHTML = `
    <strong>شكراً لمشاركتك 🙏</strong><br><br>
    تم تسجيل إجاباتك بنجاح 🌟
  `;

  chat.appendChild(msg);
}

</script>

</body>
</html>
