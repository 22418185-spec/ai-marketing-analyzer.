<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<title>AI Marketing Analyzer</title>

<style>
/* القسم الخاص بالتصميم (نفس ستايلك مع تعديلات طفيفة للاستقرار) */
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.1;
  animation: stars 60s linear infinite;
  z-index: -1;
}

@keyframes stars {
  from { transform: translateY(0); }
  to { transform: translateY(-500px); }
}

.chat-container {
  width: 95%;
  max-width: 600px;
  height: 90vh;
  background: rgba(40,40,40,0.75);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.title-box {
  text-align: center;
  margin-bottom: 15px;
}

.title-box h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, #00e5ff, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title-box p {
  font-size: 12px;
  color: #ccc;
}

.line {
  width: 60%;
  height: 2px;
  margin: 8px auto;
  background: linear-gradient(to right, transparent, #00e5ff, transparent);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.bot {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 15px;
  margin: 10px 6px;
  animation: fadeIn 0.5s ease forwards;
  border: 1px solid rgba(255,255,255,0.05);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.buttons {
  display: flex;
  gap: 10px;
  margin: 5px 6px 20px 6px;
  flex-wrap: wrap;
}

.buttons button {
  flex: 1;
  min-width: 90px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.08);
  color: #00e5ff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  font-family: 'Cairo', sans-serif;
}

.buttons button:hover:not(:disabled) {
  background: linear-gradient(135deg, #00e5ff, #0077ff);
  color: white;
  box-shadow: 0 0 10px #00e5ff;
  transform: scale(1.05);
}

.buttons button.selected {
  background: linear-gradient(135deg, #00e5ff, #0077ff) !important;
  color: white !important;
  box-shadow: 0 0 15px #00e5ff;
  transform: scale(1.05);
  opacity: 1 !important;
}

.buttons button:disabled {
  opacity: 0.4;
  cursor: default;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="title-box">
    <h1>AI MARKETING ANALYZER</h1>
    <p>تحليل تأثير التسويق بالذكاء الاصطناعي على العلامات التجارية الرقمية</p>
    <div class="line"></div>
  </div>

  <div id="chat" class="messages"></div>
</div>

<script>
let answers = [];
let step = 0;
let sent = false;
let isProcessing = false; // قفل حماية لمنع التكرار

const questions = [
  "تؤثر أدوات الذكاء الاصطناعي بشكل إيجابي على الحملات التسويقية الرقمية.",
  "يساعد الذكاء الاصطناعي في فهم سلوك العملاء بشكل أدق.",
  "تحليل البيانات باستخدام الذكاء الاصطناعي يزيد من فعالية التسويق.",
  "الإعلانات المولدة بالذكاء الاصطناعي أكثر جذباً من التقليدية.",
  "الثقة بالإعلانات الرقمية تعتمد على وجود الذكاء الاصطناعي فيها.",
  "الذكاء الاصطناعي يقلل من تكلفة الحملات التسويقية.",
  "يساعد الذكاء الاصطناعي في استهداف الجمهور المناسب بدقة.",
  "تستخدم الشركات الكبرى الذكاء الاصطناعي بشكل واسع في التسويق.",
  "الذكاء الاصطناعي يحسن من تجربة المستخدم مع العلامة التجارية.",
  "الذكاء الاصطناعي يزيد من سرعة اتخاذ القرارات التسويقية.",
  "الذكاء الاصطناعي يعزز ولاء العملاء للعلامة التجارية.",
  "التسويق بالذكاء الاصطناعي أكثر فاعلية من التسويق التقليدي.",
  "أدوات الذكاء الاصطناعي تساعد في إنشاء محتوى إعلاني أفضل.",
  "الذكاء الاصطناعي يساعد في توقع اتجاهات السوق المستقبلية.",
  "الاعتماد على الذكاء الاصطناعي أصبح ضرورة للشركات الحديثة.",
  "استخدام الذكاء الاصطناعي يحسن من صورة العلامة التجارية.",
  "الذكاء الاصطناعي يقلل من الأخطاء في الحملات التسويقية.",
  "الذكاء الاصطناعي يساعد في تحسين إدارة وسائل التواصل الاجتماعي.",
  "الإعلانات المخصصة بالذكاء الاصطناعي أكثر نجاحاً.",
  "الذكاء الاصطناعي يرفع من معدل التحويل في التسويق الرقمي.",
  "الذكاء الاصطناعي يساهم في زيادة الأرباح للشركات.",
  "الذكاء الاصطناعي يسهل تحليل المنافسين في السوق.",
  "الذكاء الاصطناعي يحسن تجربة التسوق الإلكتروني.",
  "الاعتماد على الذكاء الاصطناعي يقلل الحاجة للعنصر البشري.",
  "مستقبل التسويق يعتمد بشكل كبير على الذكاء الاصطناعي."
];

window.onload = () => {
  askQuestion();
};

function askQuestion() {
  if (step >= questions.length) {
    finish();
    return;
  }

  let chat = document.getElementById("chat");

  // إنشاء وعاء السؤال
  let qDiv = document.createElement("div");
  qDiv.className = "bot";
  qDiv.innerHTML = `<strong>السؤال ${step + 1}:</strong><br>${questions[step]}`;
  
  // إنشاء وعاء الأزرار
  let btnsDiv = document.createElement("div");
  btnsDiv.className = "buttons";
  btnsDiv.id = "group-" + step;

  btnsDiv.innerHTML = `
    <button onclick="handleAnswer(3, this)">موافق</button>
    <button onclick="handleAnswer(2, this)">محايد</button>
    <button onclick="handleAnswer(1, this)">غير موافق</button>
  `;

  // تعطيل مؤقت لمنع النقرات العشوائية أثناء الظهور
  btnsDiv.querySelectorAll("button").forEach(b => b.disabled = true);

  chat.appendChild(qDiv);
  chat.appendChild(btnsDiv);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    btnsDiv.querySelectorAll("button").forEach(b => b.disabled = false);
    isProcessing = false;
  }, 400);
}

function handleAnswer(value, btn) {
  if (isProcessing) return; // حماية ضد النقر السريع جداً
  
  let container = btn.parentElement;
  if (container.classList.contains("done")) return;
  
  isProcessing = true;
  container.classList.add("done");

  // تمييز الزر المختار وتعطيل البقية
  container.querySelectorAll("button").forEach(b => {
    b.disabled = true;
    b.classList.remove("selected");
  });
  btn.classList.add("selected");

  // تخزين الإجابة
  answers.push({
    question: questions[step],
    answer: value
  });

  step++;

  // الانتقال للسؤال التالي بعد تأخير بسيط
  setTimeout(() => {
    askQuestion();
  }, 500);
}

function finish() {
  if (sent) return;
  sent = true;

  let chat = document.getElementById("chat");
  let loadingMsg = document.createElement("div");
  loadingMsg.className = "bot";
  loadingMsg.innerText = "جاري حفظ إجاباتك... ⏳";
  chat.appendChild(loadingMsg);
  chat.scrollTop = chat.scrollHeight;

  // إرسال البيانات إلى Google Script الخاص بك
  fetch("https://script.google.com/macros/s/AKfycbwU3LacCTZUAW80wuFxDTofscMRn3bo8OegKb-FG2LEPHCVwauh-s_2mGM2eEU4rYZohg/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ responses: answers })
  }).then(() => {
    loadingMsg.remove();
    let finalMsg = document.createElement("div");
    finalMsg.className = "bot";
    finalMsg.innerHTML = `<strong>شكراً لمشاركتك 🙏</strong><br><br>تم تسجيل إجاباتك بنجاح 🌟`;
    chat.appendChild(finalMsg);
    chat.scrollTop = chat.scrollHeight;
  }).catch(err => {
    loadingMsg.innerText = "حدث خطأ أثناء الحفظ، يرجى المحاولة لاحقاً.";
    console.error(err);
  });
}
</script>

</body>
</html>
