<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<title>AI Marketing Analyzer</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.1;
  animation: stars 60s linear infinite;
  z-index: -1;
}
@keyframes stars {
  from { transform: translateY(0); }
  to { transform: translateY(-500px); }
}
.chat-container {
  width: 95%;
  max-width: 600px;
  height: 90vh;
  background: rgba(40,40,40,0.75);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 15px;
  display: flex;
  flex-direction: column;
}
.title-box {
  text-align: center;
  margin-bottom: 15px;
}
.title-box h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, #00e5ff, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.title-box p {
  font-size: 12px;
  color: #ccc;
}
.line {
  width: 60%;
  height: 2px;
  margin: 8px auto;
  background: linear-gradient(to right, transparent, #00e5ff, transparent);
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.bot {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin: 6px;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
.buttons {
  display: flex;
  gap: 10px;
  margin: 12px 6px;
  flex-wrap: wrap;
}
.buttons button {
  flex: 1;
  min-width: 100px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.08);
  color: #00e5ff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  outline: none;
}
.buttons button:hover:not(:disabled) {
  background: linear-gradient(135deg, #00e5ff, #0077ff);
  color: white;
}
.buttons button.selected {
  background: linear-gradient(135deg, #00e5ff, #0077ff) !important;
  color: white !important;
}
.buttons button:disabled {
  opacity: 0.4;
  cursor: default;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="title-box">
    <h1>AI MARKETING ANALYZER</h1>
    <p>تحليل تأثير التسويق بالذكاء الاصطناعي على العلامات التجارية الرقمية</p>
    <div class="line"></div>
  </div>
  <div id="chat" class="messages"></div>
</div>

<script>
let answers = [];
let step = 0;
let sent = false;
let locked = false;

let questions = [
"يساهم التسويق بالذكاء الاصطناعي في تحسين صورة العلامة التجارية الرقمية.",
"يؤثر استخدام الذكاء الاصطناعي في الإعلانات على ثقة المستخدم بالعلامة التجارية.",
"يساعد الذكاء الاصطناعي في جعل العلامة التجارية أكثر تفاعلاً مع العملاء.",
"تؤدي الحملات التسويقية المعتمدة على الذكاء الاصطناعي إلى نتائج أفضل للعلامة التجارية.",
"يساعد الذكاء الاصطناعي في بناء هوية رقمية أقوى للعلامة التجارية.",
"الإعلانات المخصصة بالذكاء الاصطناعي تزيد من ارتباط المستخدم بالعلامة التجارية.",
"يؤثر الذكاء الاصطناعي إيجابًا على تجربة المستخدم مع العلامة التجارية الرقمية.",
"يساهم الذكاء الاصطناعي في تحسين سمعة العلامة التجارية عبر المنصات الرقمية.",
"يؤدي استخدام الذكاء الاصطناعي في التسويق إلى زيادة ولاء العملاء للعلامة التجارية.",
"يساعد الذكاء الاصطناعي العلامات التجارية في فهم احتياجات الجمهور المستهدف بدقة.",
"تؤدي الحملات المدعومة بالذكاء الاصطناعي إلى رفع معدل التفاعل مع العلامة التجارية.",
"يساهم الذكاء الاصطناعي في تحسين جودة المحتوى التسويقي للعلامة التجارية.",
"يعتمد نجاح العلامة التجارية الرقمية على استخدام تقنيات الذكاء الاصطناعي في التسويق.",
"يساعد الذكاء الاصطناعي في تعزيز التميز التنافسي للعلامة التجارية.",
"يؤدي الذكاء الاصطناعي إلى تحسين قرارات التسويق الخاصة بالعلامة التجارية.",
"يساهم الذكاء الاصطناعي في زيادة فعالية الإعلانات الرقمية للعلامة التجارية.",
"يؤثر استخدام الذكاء الاصطناعي على سرعة انتشار العلامة التجارية رقميًا.",
"يساعد الذكاء الاصطناعي في تقليل الأخطاء التسويقية التي تؤثر على العلامة التجارية.",
"تعتمد العلامات التجارية الحديثة على الذكاء الاصطناعي في استراتيجياتها التسويقية.",
"يساهم الذكاء الاصطناعي في رفع مستوى رضا العملاء عن العلامة التجارية."
];

window.onload = () => askQuestion();

function askQuestion() {
  if (step >= questions.length) return finish();

  let chat = document.getElementById("chat");

  let q = document.createElement("div");
  q.className = "bot";
  q.innerHTML = "<strong>السؤال " + (step + 1) + ":</strong><br>" + questions[step];

  let btns = document.createElement("div");
  btns.className = "buttons";

  btns.innerHTML = `
    <button onclick="answer(3,this)">موافق</button>
    <button onclick="answer(2,this)">محايد</button>
    <button onclick="answer(1,this)">غير موافق</button>
  `;

  chat.appendChild(q);
  chat.appendChild(btns);
  chat.scrollTop = chat.scrollHeight;
}

function answer(value, btn) {
  if (locked) return;
  locked = true;

  const current = step;
  answers[current] = value;

  let container = btn.parentElement;
  container.querySelectorAll("button").forEach(b => b.disabled = true);
  btn.classList.add("selected");

  step = current + 1;

  setTimeout(() => {
    locked = false;
    askQuestion();
  }, 200);
}

function finish() {
  if (sent) return;
  sent = true;

  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "bot";
  msg.innerText = "جاري حفظ الإجابات... ⏳";
  chat.appendChild(msg);

  fetch("https://script.google.com/macros/s/AKfycbzHqjEsUZQnEm_nkTSwtm8JNiKhJIoz738IqU97uEwWlpC-l7Hu6CglNdsVoaT5CKfEsQ/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ answers })
  });

  setTimeout(() => {
    msg.innerText = "تم حفظ الإجابات بنجاح ✅";
  }, 800);
}
</script>

</body>
</html>
