<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <title>AI Marketing Analyzer</title>
    <style>
        /* الجزء الخاص بالخلفية والنجوم المتحركة - كامل كما كان */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            color: white;
            background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            touch-action: manipulation;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: radial-gradient(white 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
            animation: stars 60s linear infinite;
            z-index: -1;
        }

        @keyframes stars {
            from { transform: translateY(0); }
            to { transform: translateY(-500px); }
        }

        /* حاوية الدردشة الزجاجية */
        .chat-container {
            width: 95%;
            max-width: 600px;
            height: 90vh;
            background: rgba(40, 40, 40, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* صندوق العنوان واللوجو */
        .title-box {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-box h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00e5ff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .title-box p {
            margin: 8px 0 0;
            font-size: 14px;
            color: #ddd;
            font-weight: 400;
            line-height: 1.4;
        }

        .line {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #00e5ff, #8a2be2);
            margin: 10px auto;
            border-radius: 5px;
        }

        /* منطقة الرسائل */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* تعديل حجم فقاعة السؤال لتناسب الواجهة */
        .bot {
            align-self: stretch; /* تجعلها تأخذ عرض الحاوية */
            background: rgba(255, 255, 255, 0.08);
            padding: 18px 22px;
            border-radius: 20px 20px 20px 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px; /* حجم الخط أوضح */
            line-height: 1.6;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* حاوية الأزرار */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .buttons button {
            flex: 1;
            min-width: 100px;
            padding: 14px;
            border-radius: 15px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.1);
            color: #00e5ff;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* يمنع اللون الأسود في الموبايل */
        }

        /* تعديل اللون عند الكبس أو الـ hover لأزرق معتدل */
        .buttons button:hover {
            background: rgba(0, 150, 255, 0.3); /* أزرق معتدل */
            color: white;
            border-color: #00e5ff;
        }

        .buttons button:active {
            background: #007bff !important; /* أزرق صريح عند الكبس */
            transform: scale(0.98);
        }

        .buttons button.selected {
            background: linear-gradient(135deg, #007bff, #00c2ff); /* أزرق متدرج جميل */
            color: white;
            border: none;
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .finish-msg {
            text-align: center;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="title-box">
        <h1>AI MARKETING ANALYZER</h1>
        <p>استبانة لتحليل تأثير التسويق بالذكاء الاصطناعي على العلامات التجارية الرقمية</p>
        <div class="line"></div>
    </div>
    <div id="chat" class="messages"></div>
</div>

<script>
    let answers = [];
    let step = 0;
    let isSending = false;

    // رابط الجوجل شيت الخاص بك
    const scriptURL = "https://script.google.com/macros/s/AKfycbwU3LacCTZUAW80wuFxDTofscMRn3bo8OegKb-FG2LEPHCVwauh-s_2mGM2eEU4rYZohg/exec";

    const questions = [
        "تؤثر أدوات الذكاء الاصطناعي بشكل إيجابي على الحملات التسويقية الرقمية.",
        "يساعد الذكاء الاصطناعي في فهم سلوك العملاء بشكل أدق.",
        "تحليل البيانات باستخدام الذكاء الاصطناعي يزيد من فعالية التسويق.",
        "الإعلانات المولدة بالذكاء الاصطناعي أكثر جذباً من التقليدية.",
        "الثقة بالإعلانات الرقمية تعتمد على وجود الذكاء الاصطناعي فيها.",
        "الذكاء الاصطناعي يقلل من تكلفة الحملات التسويقية.",
        "يساعد الذكاء الاصطناعي في استهداف الجمهور المناسب بدقة.",
        "تستخدم الشركات الكبرى الذكاء الاصطناعي بشكل واسع في التسويق.",
        "الذكاء الاصطناعي يحسن من تجربة المستخدم مع العلامة التجارية.",
        "الذكاء الاصطناعي يزيد من سرعة اتخاذ القرارات التسويقية.",
        "الذكاء الاصطناعي يعزز ولاء العملاء للعلامة التجارية.",
        "التسويق بالذكاء الاصطناعي أكثر فاعلية من التسويق التقليدي.",
        "أدوات الذكاء الاصطناعي تساعد في إنشاء محتوى إعلاني أفضل.",
        "الذكاء الاصطناعي يساعد في توقع اتجاهات السوق المستقبلية.",
        "الاعتماد على الذكاء الاصطناعي أصبح ضرورة للشركات الحديثة.",
        "استخدام الذكاء الاصطناعي يحسن من صورة العلامة التجارية.",
        "الذكاء الاصطناعي يقلل من الأخطاء في الحملات التسويقية.",
        "الذكاء الاصطناعي يساعد في تحسين إدارة وسائل التواصل الاجتماعي.",
        "الإعلانات المخصصة بالذكاء الاصطناعي أكثر نجاحاً.",
        "الذكاء الاصطناعي يرفع من معدل التحويل في التسويق الرقمي.",
        "الذكاء الاصطناعي يساهم في زيادة الأرباح للشركات.",
        "الذكاء الاصطناعي يسهل تحليل المنافسين في السوق.",
        "الذكاء الاصطناعي يحسن تجربة التسوق الإلكتروني.",
        "الاعتماد على الذكاء الاصطناعي يقلل الحاجة للعنصر البشري.",
        "مستقبل التسويق يعتمد بشكل كبير على الذكاء الاصطناعي."
    ];

    window.onload = askQuestion;

    function askQuestion() {
        if (step >= questions.length) {
            finishSurvey();
            return;
        }

        const chat = document.getElementById("chat");
        
        const qDiv = document.createElement("div");
        qDiv.className = "bot";
        qDiv.innerHTML = `<strong>السؤال ${step + 1}:</strong><br>${questions[step]}`;
        
        const bDiv = document.createElement("div");
        bDiv.className = "buttons";
        bDiv.innerHTML = `
            <button onclick="answer(3, this, ${step})">موافق</button>
            <button onclick="answer(2, this, ${step})">محايد</button>
            <button onclick="answer(1, this, ${step})">غير موافق</button>
        `;

        chat.appendChild(qDiv);
        chat.appendChild(bDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function answer(val, btn, qId) {
        if (qId !== step) return;

        const container = btn.parentElement;
        container.querySelectorAll("button").forEach(b => b.disabled = true);
        btn.classList.add("selected");
        
        answers[step] = val;
        step++;

        setTimeout(askQuestion, 50);
    }

    function finishSurvey() {
        if (isSending) return;
        isSending = true;

        const chat = document.getElementById("chat");
        const loadingMsg = document.createElement("div");
        loadingMsg.className = "bot";
        loadingMsg.innerText = "جاري إرسال إجاباتك... ⏳";
        chat.appendChild(loadingMsg);
        chat.scrollTop = chat.scrollHeight;

        fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ answers: answers })
        }).then(() => {
            loadingMsg.remove();
            const finishDiv = document.createElement("div");
            finishDiv.className = "finish-msg";
            finishDiv.innerHTML = "شكراً لمشاركتك القيمة! 🙏<br><br>تم تسجيل إجاباتك بنجاح.";
            chat.appendChild(finishDiv);
            chat.scrollTop = chat.scrollHeight;
        });
    }
</script>

</body>
</html>
