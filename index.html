<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<title>AI Marketing Analyzer</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.1;
  animation: stars 60s linear infinite;
  z-index: -1;
}

@keyframes stars {
  from { transform: translateY(0); }
  to { transform: translateY(-500px); }
}

.chat-container {
  width: 95%;
  max-width: 600px;
  height: 90vh;
  background: rgba(40,40,40,0.75);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.title-box {
  text-align: center;
  margin-bottom: 15px;
}

.title-box h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, #00e5ff, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title-box p {
  font-size: 12px;
  color: #ccc;
}

.line {
  width: 60%;
  height: 2px;
  margin: 8px auto;
  background: linear-gradient(to right, transparent, #00e5ff, transparent);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.bot {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin: 6px;
}

.buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin: 10px 0;
}

.buttons button {
  flex: 1;
  min-width: 100px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.08);
  color: #00e5ff;
  font-weight: 600;
  cursor: pointer;
}

.buttons button.selected {
  background: #00e5ff !important;
  color: black !important;
}

.buttons button:disabled {
  opacity: 0.4;
  cursor: default;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="title-box">
    <h1>AI MARKETING ANALYZER</h1>
    <p>تحليل تأثير التسويق بالذكاء الاصطناعي على العلامات التجارية الرقمية</p>
    <div class="line"></div>
  </div>

  <div id="chat" class="messages"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzkFR0KJQi9AenpPkS4FaFfVqySW-R77CG5FnPsvFQhT3rj1yH6pSMPwTp-d9lwOjDC5Q/exec";

let answers = [];
let index = 0;
let sent = false;

const questions = [
"يساهم التسويق بالذكاء الاصطناعي في تحسين صورة العلامة التجارية الرقمية.",
"يؤثر استخدام الذكاء الاصطناعي في الإعلانات على ثقة المستخدم بالعلامة التجارية.",
"يساعد الذكاء الاصطناعي في جعل العلامة التجارية أكثر تفاعلاً مع العملاء.",
"تؤدي الحملات التسويقية المعتمدة على الذكاء الاصطناعي إلى نتائج أفضل للعلامة التجارية.",
"يساعد الذكاء الاصطناعي في بناء هوية رقمية أقوى للعلامة التجارية.",
"الإعلانات المخصصة بالذكاء الاصطناعي تزيد من ارتباط المستخدم بالعلامة التجارية.",
"يؤثر الذكاء الاصطناعي إيجابًا على تجربة المستخدم مع العلامة التجارية الرقمية.",
"يساهم الذكاء الاصطناعي في تحسين سمعة العلامة التجارية عبر المنصات الرقمية.",
"يؤدي استخدام الذكاء الاصطناعي في التسويق إلى زيادة ولاء العملاء للعلامة التجارية.",
"يساعد الذكاء الاصطناعي العلامات التجارية في فهم احتياجات الجمهور المستهدف بدقة.",
"تؤدي الحملات المدعومة بالذكاء الاصطناعي إلى رفع معدل التفاعل مع العلامة التجارية.",
"يساهم الذكاء الاصطناعي في تحسين جودة المحتوى التسويقي للعلامة التجارية.",
"يعتمد نجاح العلامة التجارية الرقمية على استخدام تقنيات الذكاء الاصطناعي في التسويق.",
"يساعد الذكاء الاصطناعي في تعزيز التميز التنافسي للعلامة التجارية.",
"يؤدي الذكاء الاصطناعي إلى تحسين قرارات التسويق الخاصة بالعلامة التجارية.",
"يساهم الذكاء الاصطناعي في زيادة فعالية الإعلانات الرقمية للعلامة التجارية.",
"يؤثر استخدام الذكاء الاصطناعي على سرعة انتشار العلامة التجارية رقميًا.",
"يساعد الذكاء الاصطناعي في تقليل الأخطاء التسويقية التي تؤثر على العلامة التجارية.",
"تعتمد العلامات التجارية الحديثة على الذكاء الاصطناعي في استراتيجياتها التسويقية.",
"يساهم الذكاء الاصطناعي في رفع مستوى رضا العملاء عن العلامة التجارية.",
"يساعد الذكاء الاصطناعي في تحسين تحليل البيانات التسويقية بشكل أسرع.",
"يؤثر الذكاء الاصطناعي على دقة استهداف الجمهور الإعلاني.",
"يساهم الذكاء الاصطناعي في تقليل تكلفة الحملات الإعلانية.",
"يساعد الذكاء الاصطناعي في توقع سلوك العملاء المستقبلي.",
"الذكاء الاصطناعي أصبح جزء أساسي من التسويق الرقمي الحديث."
];

window.onload = () => renderQuestion();

function renderQuestion() {
  if (index >= questions.length) return finish();

  const chat = document.getElementById("chat");

  const q = document.createElement("div");
  q.className = "bot";
  q.innerHTML = "<strong>السؤال " + (index + 1) + ":</strong><br>" + questions[index];

  const btns = document.createElement("div");
  btns.className = "buttons";

  const options = [
    { text: "موافق", value: 3 },
    { text: "محايد", value: 2 },
    { text: "غير موافق", value: 1 }
  ];

  options.forEach(opt => {
    const btn = document.createElement("button");

    btn.innerText = opt.text;

    btn.onclick = () => {
      if (answers[index] !== undefined) return;

      answers[index] = opt.value;

      btns.querySelectorAll("button").forEach(b => b.disabled = true);
      btn.classList.add("selected");

      index++;
      setTimeout(renderQuestion, 150);
    };

    btns.appendChild(btn);
  });

  chat.appendChild(q);
  chat.appendChild(btns);
  chat.scrollTop = chat.scrollHeight;
}

function finish() {
  if (sent) return;
  sent = true;

  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "bot";
  msg.innerText = "جاري حفظ الإجابات... ⏳";
  chat.appendChild(msg);

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      answers: answers.map(Number)
    })
  })
  .then(() => {
    msg.innerText = "تم حفظ الإجابات بنجاح ✅";
  })
  .catch(() => {
    msg.innerText = "حدث خطأ في الإرسال ❌";
  });
}
</script>

</body>
</html>
