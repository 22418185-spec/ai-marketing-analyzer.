<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<title>AI Marketing Analyzer</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.1;
  animation: stars 60s linear infinite;
  z-index: -1;
}

@keyframes stars {
  from { transform: translateY(0); }
  to { transform: translateY(-500px); }
}

/* Full screen */
.chat-container {
  width: 100vw;
  height: 100vh;
  background: rgba(20, 20, 35, 0.55);
  backdrop-filter: blur(15px);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.title-box {
  text-align: center;
  margin-bottom: 10px;
}

.title-box h1 {
  font-size: 22px;
  font-weight: 600;
  background: linear-gradient(90deg, #00e5ff, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title-box p {
  font-size: 13px;
  color: #ccc;
}

.line {
  width: 60%;
  height: 2px;
  margin: 8px auto;
  background: linear-gradient(to right, transparent, #00e5ff, transparent);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.bot {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin: 6px 0;
}

.buttons {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.08);
  color: #00e5ff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.buttons button:hover {
  background: rgba(0,229,255,0.15);
}

.buttons button.selected {
  background: linear-gradient(135deg, #00e5ff, #0077ff);
  color: white;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="title-box">
    <h1>استبانة لتحليل تأثير التسويق بالذكاء الاصطناعي</h1>
    <p>على العلامات التجارية الرقمية</p>
    <div class="line"></div>
  </div>

  <div id="chat" class="messages"></div>

</div>

<script>

let answers = [];
let step = 0;

let questions = [
"تؤثر أدوات الذكاء الاصطناعي بشكل إيجابي على التسويق الرقمي.",
"يساعد الذكاء الاصطناعي في فهم سلوك العملاء بدقة.",
"الإعلانات بالذكاء الاصطناعي أكثر جذباً.",
"الثقة بالإعلانات تزيد مع الذكاء الاصطناعي.",
"الذكاء الاصطناعي يقلل تكلفة التسويق.",
"استهداف الجمهور يصبح أدق.",
"الشركات تعتمد على AI بشكل كبير.",
"AI يحسن تجربة المستخدم.",
"AI يزيد سرعة اتخاذ القرار.",
"AI يعزز ولاء العملاء.",
"التسويق بالذكاء الاصطناعي أكثر فعالية.",
"AI يساعد في إنشاء محتوى إعلاني.",
"AI يتوقع اتجاهات السوق.",
"AI أصبح ضرورة في التسويق.",
"AI يحسن صورة العلامة التجارية.",
"AI يقلل الأخطاء.",
"AI يساعد السوشيال ميديا.",
"الإعلانات المخصصة أنجح.",
"AI يزيد التحويل.",
"AI يزيد الأرباح.",
"AI يسهل تحليل المنافسين.",
"AI يحسن التجارة الإلكترونية.",
"الاعتماد على AI يقلل البشر.",
"مستقبل التسويق يعتمد على AI.",
"AI هو الأساس القادم."
];

window.onload = () => {
  askQuestion();
};

function askQuestion() {
  if (step < questions.length) {

    let chat = document.getElementById("chat");

    let q = document.createElement("div");
    q.className = "bot";
    q.innerHTML = "<strong>السؤال " + (step + 1) + ":</strong><br>" + questions[step];

    chat.appendChild(q);

    let btns = document.createElement("div");
    btns.className = "buttons";

    btns.innerHTML = `
      <button onclick="answer(3,this)">موافق</button>
      <button onclick="answer(2,this)">محايد</button>
      <button onclick="answer(1,this)">غير موافق</button>
    `;

    chat.appendChild(btns);

    chat.scrollTop = chat.scrollHeight;

  } else {
    finish();
  }
}

function answer(value, btn) {
  answers.push(value);

  let parent = btn.parentElement;
  let buttons = parent.querySelectorAll("button");

  // تعطيل كل الأزرار
  buttons.forEach(b => {
    b.disabled = true;
    b.classList.remove("selected");
  });

  // تأثير الضغط
  btn.classList.add("selected");
  btn.style.transform = "scale(0.95)";

  setTimeout(() => {
    btn.style.transform = "scale(1)";
  }, 150);

  setTimeout(() => {
    step++;
    askQuestion();
  }, 250);
}

function finish() {
  let chat = document.getElementById("chat");

  let total = answers.reduce((a,b)=>a+b,0);
  let max = answers.length * 3;
  let percent = Math.round((total/max)*100);

  let result =
    percent >= 80 ? "تأثير قوي جداً" :
    percent >= 50 ? "تأثير متوسط" :
    "تأثير ضعيف";

  let msg = document.createElement("div");
  msg.className = "bot";
  msg.innerText =
    "تم الانتهاء من الاستبانة.\n\n" +
    "نسبة التأثير: " + percent + "%\n" +
    result + "\n\n" +
    "شكراً لمشاركتك.";

  chat.appendChild(msg);
}

</script>

</body>
</html>
