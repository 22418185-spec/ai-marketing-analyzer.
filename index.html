<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<title>AI Marketing Analyzer</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0f0c29, #1a1a40, #000);
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.chat-container {
  width: 100vw;
  height: 100vh;
  background: rgba(20, 20, 35, 0.55);
  backdrop-filter: blur(15px);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.title-box {
  text-align: center;
  margin-bottom: 10px;
}

.title-box h1 {
  font-size: 22px;
  background: linear-gradient(90deg, #00e5ff, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title-box p {
  font-size: 13px;
  color: #ccc;
}

.messages {
  flex: 1;
  overflow-y: auto;
}

.bot {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin: 8px 0;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.08);
  color: #00e5ff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

/* ✨ التحديد الواضح جداً */
.buttons button.selected {
  background: linear-gradient(135deg, #00e5ff, #0077ff);
  color: white;
  transform: scale(1.08);
  box-shadow: 0 0 15px rgba(0,229,255,0.6);
}

.buttons button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="title-box">
    <h1>استبانة لتحليل تأثير التسويق بالذكاء الاصطناعي</h1>
    <p>على العلامات التجارية الرقمية</p>
  </div>

  <div id="chat" class="messages"></div>

</div>

<script>

let answers = [];
let step = 0;

let questions = [
"تؤثر أدوات الذكاء الاصطناعي بشكل إيجابي.",
"يساعد في فهم العملاء.",
"الإعلانات أكثر جذباً.",
"الثقة تزيد.",
"يقلل التكلفة.",
"يستهدف الجمهور بدقة.",
"يعتمد عليه التسويق.",
"يحسن تجربة المستخدم.",
"يسرّع القرار.",
"يعزز الولاء.",
"فعال جداً.",
"يساعد المحتوى.",
"يتوقع السوق.",
"ضروري الآن.",
"يحسن العلامة.",
"يقلل الأخطاء.",
"يدعم السوشيال ميديا.",
"الإعلانات المخصصة أفضل.",
"يزيد التحويل.",
"يزيد الأرباح.",
"يساعد التحليل.",
"يحسن التجارة.",
"يقلل الاعتماد على البشر.",
"المستقبل يعتمد عليه.",
"هو الأساس."
];

window.onload = () => askQuestion();

function askQuestion() {

  if (step >= questions.length) return finish();

  let chat = document.getElementById("chat");

  let q = document.createElement("div");
  q.className = "bot";
  q.innerHTML = "السؤال " + (step+1) + ":<br>" + questions[step];

  let btns = document.createElement("div");
  btns.className = "buttons";

  btns.innerHTML = `
    <button onclick="answer(3,this)">موافق</button>
    <button onclick="answer(2,this)">محايد</button>
    <button onclick="answer(1,this)">غير موافق</button>
  `;

  chat.appendChild(q);
  chat.appendChild(btns);

  chat.scrollTop = chat.scrollHeight;
}

function answer(value, btn) {

  answers.push(value);

  let buttons = btn.parentElement.querySelectorAll("button");

  buttons.forEach(b => {
    b.disabled = true;
    b.classList.remove("selected");
  });

  // ✔ إبراز الزر المختار بشكل واضح جداً
  btn.classList.add("selected");

  setTimeout(() => {
    step++;
    askQuestion();
  }, 300);
}

function finish() {

  let total = answers.reduce((a,b)=>a+b,0);
  let max = answers.length * 3;
  let percent = Math.round((total/max)*100);

  let result =
    percent >= 80 ? "تأثير قوي جداً" :
    percent >= 50 ? "تأثير متوسط" :
    "تأثير ضعيف";

  let msg = document.createElement("div");
  msg.className = "bot";
  msg.innerText =
    "تم الانتهاء.\n\n" +
    "نسبة التأثير: " + percent + "%\n" +
    result + "\n\nشكراً لمشاركتك.";

  document.getElementById("chat").appendChild(msg);
}

</script>

</body>
</html>
